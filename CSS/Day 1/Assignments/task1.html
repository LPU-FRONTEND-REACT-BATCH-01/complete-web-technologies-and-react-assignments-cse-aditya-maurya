<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task</title>
 <style>
    
    .lassi > li {
        color: green;
    }

  
    .biryani > li {
        color: red;
    }

    
    .biryani h1 + li + li + li {
        color: grey;
    }

   
    .biryani .chicken + li {
        color: skyblue;
    }

   
    .chicken ul li {
        color: black; 
    }

    
    .sugar li {
        color: red;
        list-style-type: circle;
    }
</style>
</head>
<body>
    <ul class="biryani">
        <h1>Ingredients for Biryani</h1>
        <li>Rice</li>
        <li>Chicken</li>
        <div class="chicken">

                <ul>
                    <li>Fried</li>
                    <li>Grilled</li>
                    <li>Roasted</li>
                </ul>

            </div>
        <li>Paneer</li>
        <h1>Fighter Jet</h1>
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>

    <hr>

    <ul class="lassi">
        <h1>Ingredients for Lassi</h1>
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar</li>
        <div>
            <ul class="sugar">
                <li>White Sugar</li>
                <li>Brown Sugar</li>
            </ul>
        </div>
        <li>Malai</li>
        <li>Kova</li>
    </ul>
</body>
</html>
