<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Selectors</title>

    <style>
        a:link {
            color: blue;
        }
        a:visited {
            color: purple;
        }
        a:active {
            color: red;
        }
    </style>
</head>
<body>
    <a href="https://www.amazon.com">Amazon</a>

    
</body>
</html>
