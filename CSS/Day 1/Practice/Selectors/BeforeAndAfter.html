<!DOCTYPE html>
<html>
<head>
    <title>Simple Before</title>
    <style>
        h1:hover::after {
            content: " Start ";
        }
          h2+:hover::before {
            content: " Start ";
        }
    </style>
</head>
<body>

    <h1>Hover</h1>
    <h2>Hover</h2>

</body>
</html>
