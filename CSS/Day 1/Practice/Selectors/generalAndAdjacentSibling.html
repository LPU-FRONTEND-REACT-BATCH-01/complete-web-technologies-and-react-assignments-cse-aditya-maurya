<!DOCTYPE html>
<html>
<head>
    <title>Nested List Example</title>

    <style>
        /* Adjacent sibling */
        li.first + li {
            color: red;
        }

        /* General sibling */
        li.first ~ li {
            background-color: lightgray;
        }

        /* Nested list styling */
        ul ul {
            margin-left: 20px;
            color: blue;
        }
    </style>
</head>
<body>

  
    <ul class="biryani">
        <h1 class="title">Ingredient for Biryani</h1>
        <li>Rice</li>
        <li>Chicken</li>
        

    </ul>
</body>
</html>
