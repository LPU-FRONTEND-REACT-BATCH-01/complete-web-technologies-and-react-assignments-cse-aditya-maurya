<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="1">
        <tr>
            <td>Quick</td>
            <td colspan="2">Brown fox</td>
            <td>Jumps</td>
            
        </tr>
        <tr>
            <td rowspan="3">over the </td>
            <td>lazy</td>
            <td>dog</td>
            <td>and</td>
        </tr>
        <tr>
            <td>then</td>
            <td>it</td>
            <td>fall</td>
            
        </tr>
    </tr>
    <tr>
        <td colspan="3">prey to a lion</td>
       
    </tr>
    
</body>
</html>
