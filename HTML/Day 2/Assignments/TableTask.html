<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groceries</title>
</head>
<body>
    <table border="3" cellpadding="10px" cellspacing="20px" style="border-collapse: collapse;">
        <thead>
            <tr>
                <th>Grocery Item</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>
        <tr>
            <td>Apples</td>
            <td>5</td>
            <td>$1.00</td>
        </tr>
        <tr>
            <td>Banana</td>
            <td>3</td>
            <td>$0.50</td>
        </tr>
        <tr>
            <td>Sugar</td>
            <td>1kg</td>
            <td>$2.00</td>
        </tr>
        <tr>
            <td>Milk</td>
            <td>1L</td>
            <td>$3.00</td>
        </tr>
        <tr>
            <td> Eggs</td>
            <td>12</td>
            <td>$2.50</td>
        </tr>
        <tr>
            <td>Rice</td>
            <td>10Kg</td>
            <td>$7.00</td>
        </tr>

    </table>
    
</body>
</html>
